name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run test suite
        run: cargo test

      - name: Check examples
        run: cargo check --examples

      - name: Verify crate can be packaged
        run: cargo publish --dry-run
